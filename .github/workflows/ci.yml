name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]

    env:
      QT_QPA_PLATFORM: offscreen
      PYTEST_QT_API: pyqt6

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system Qt deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libglib2.0-0 libdbus-1-3 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            xvfb

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Type-check core with mypy
        run: mypy

      - name: Run tests (Linux — virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum python -m pytest -q

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: python -m pytest -q
